apiVersion: apps/v1
kind: Deployment
metadata:
  name: final-project
  namespace: ivolve
spec:
  replicas: 2
  selector:
    matchLabels:
      app: final-project
  template:
    metadata:
      labels:
        app: final-project
    spec:
      containers:
      - name: final-project
        image: 317492542025.dkr.ecr.us-east-1.amazonaws.com/clouddevops-repo:6
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"